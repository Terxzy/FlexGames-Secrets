# ================================================
#   FlexGames-Secrets  |  Configuration
# ================================================

# Total secrets on the server (shown in progress messages)
total-secrets: 25

# Settings for the particle effect on discovery
particles:
  enabled: true
  type: HEART           # HEART, FIREWORKS_SPARK, CRIT_MAGIC, VILLAGER_HAPPY
  count: 25
  visible-radius: 20    # blocks around the head that see the particles

# Sounds played on events
sound:
  enabled: true
  on-find: LEVEL_UP     # Sound when a secret is found
  on-find-volume: 1.0
  on-find-pitch: 1.0
  on-gui-open: ORB_PICKUP
  on-gui-click: CLICK

# Commands run for EVERY secret found (in addition to head-specific commands)
# Placeholders: %player%, {player}
global-rewards:
  on-find: []
  on-complete:
    - "broadcast &6&l[FlexSecrets] &e%player% &7found &6ALL &7secrets! Amazing!"

# ================================================
#   Head Definitions
# ================================================
# skin:    Mojang username  (resolved online)
# texture: Base64 texture   (from minecraft-heads.com "Value" field)
# Both 'skin' and 'texture' are supported. 'texture' takes priority.
# commands: run as console; %player% / {player} = finder's name
# ================================================

heads:
  head1:
    name: "&6&l\u2726 &eGolden Secret &6&l\u2726"
